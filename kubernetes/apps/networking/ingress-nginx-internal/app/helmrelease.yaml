---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-internal
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: ingress-nginx
      version: 4.15.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      replicaCount: 2
      extraEnvs:
        - name: TZ
          value: "${TIMEZONE}"
      extraArgs:
        default-ssl-certificate: "networking/internal-tnwks-us-production-tls"
      service:
        annotations:
        loadBalancerIP: "${INGRESS_INTERNAL_ADDR}"
        externalTrafficPolicy: Local
      publishService:
        enabled: true
      # Without an explicit ingressClass + controllerValue, this controller
      # uses the chart default (`nginx` / `k8s.io/ingress-nginx`) — the same
      # values the public ingress-nginx uses — so both controllers watch all
      # Ingresses regardless of class. Pin the internal controller to only
      # the `nginx-internal` class so status fields (.status.loadBalancer.ingress)
      # are populated correctly per ingress.
      ingressClass: "nginx-internal"
      ingressClassResource:
        name: "nginx-internal"
        default: false
        controllerValue: "k8s.io/ingress-nginx-internal"
      config:
        client-header-timeout: 120
        client-body-buffer-size: "100M"
        client-body-timeout: 120
        enable-brotli: "true"
        hsts-max-age: "31449600"
        keep-alive: 120
        keep-alive-requests: 10000
        proxy-body-size: "100M"
        ssl-protocols: "TLSv1.3 TLSv1.2"
      metrics:
        enabled: ${SERVICE_MONITOR_ENABLED}
        serviceMonitor:
          enabled: ${SERVICE_MONITOR_ENABLED}
          namespace: networking
          namespaceSelector:
            any: true
      resources:
        requests:
          cpu: 20m
          memory: 500Mi
        limits:
          memory: 1000Mi
    defaultBackend:
      enabled: false
