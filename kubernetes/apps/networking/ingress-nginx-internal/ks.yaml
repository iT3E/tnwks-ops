---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-nginx-internal
  namespace: flux-system
spec:
  dependsOn:
    - name: metallb-config
  path: ./kubernetes/apps/networking/ingress-nginx-internal/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false # no flux ks dependents
  interval: 30m
  retryInterval: 1m
  timeout: 5m
