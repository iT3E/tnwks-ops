---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gateway
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: k8s-gateway
      version: 2.0.4
      sourceRef:
        kind: HelmRepository
        name: k8s-gateway
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: k8s-gateway
    # Advertise both the external (CLUSTER_DOMAIN) and internal (INTERNAL_DOMAIN)
    # zones from the cluster. In prod these resolve different DNS suffixes;
    # in local they're the same value (tnwks.local).
    domain: "${CLUSTER_DOMAIN}"
    extraArgs:
      - --domain=${INTERNAL_DOMAIN}
    ttl: 1
    service:
      type: LoadBalancer
      port: 53
      annotations:
        io.cilium/lb-ipam-ips: "${METALLB_K8S_GATEWAY_ADDR}"
      externalTrafficPolicy: Local
