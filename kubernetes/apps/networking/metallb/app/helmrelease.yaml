---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: networking
spec:
  interval: 30m
  chart:
    spec:
      chart: metallb
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    speaker:
      # L2 mode uses ARP/NDP to announce the VIPs on the docker bridge.
      # No frr/bgp needed.
      frr:
        enabled: false
    # MetalLB 0.16 made frr-k8s the default BGP backend (frrk8s.enabled=true)
    # and the chart unconditionally renders the frr-k8s subchart's
    # ServiceMonitor template, which dereferences values that don't exist
    # in our minimal config. Disable the whole subchart since L2 mode
    # doesn't need any BGP backend.
    frrk8s:
      enabled: false
