---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sites
  namespace: production
  labels:
    app.kubernetes.io/name: sites
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sites
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sites
    spec:
      containers:
        - name: nginx
          image: docker.io/library/nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            # Static site content, served read-only from the shared NFS export.
            - name: sites
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: sites
          nfs:
            # nfs-server (ganesha) fixed ClusterIP — referenced by IP, not DNS,
            # because the kubelet-level NFS mount uses the node resolver, which
            # can't resolve cluster service names. See the Service manifest.
            server: 10.43.255.254
            path: /export
            readOnly: true
        - name: nginx-config
          configMap:
            name: sites-nginx
