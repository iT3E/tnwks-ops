---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: production
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups: [44, 109, 10000]
    controllers:
      jellyfin:
        type: statefulset
        containers:
          app:
            image:
              repository: jellyfin/jellyfin
              tag: 10.11.10
            env:
              TZ: "America/Los_Angeles"
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 6Gi
    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: 8096
    persistence:
      config:
        enabled: true
        storageClass: ${STORAGE_CLASS_DEFAULT}
        accessMode: ReadWriteOnce
        size: 150Gi
        retain: true
        globalMounts:
          - path: /config
      cephfs:
        existingClaim: cephfs-hdd-subvolume
        globalMounts:
          - path: /cephfs
    ingress:
      app:
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
          hajimari.io/icon: simple-icons:jellyfin
        hosts:
          - host: &host "jellyfin.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
      internal:
        className: nginx-internal
        hosts:
          - host: &internalHost "jellyfin.${INTERNAL_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
