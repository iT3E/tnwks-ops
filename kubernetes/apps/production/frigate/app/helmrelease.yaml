---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      nodeSelector:
        google.feature.node.kubernetes.io/coral: "true"
    controllers:
      frigate:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.0-rc1@sha256:c758ec715d23d44d0cadde9d1ff884ca80f7364992de7e2401cf29ebb3f3d5f1
            env:
              TZ: America/Los_Angeles
            envFrom:
              - secretRef:
                  name: frigate-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: &port 5000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              # FastAPI takes ~25s to come up (DB vacuum + detector init);
              # without a startup probe the liveness window kills the pod
              # mid-boot.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 5
                  timeoutSeconds: 1
                  failureThreshold: 30
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 5000m
              limits:
                memory: 8Gi
    service:
      app:
        controller: frigate
        ports:
          http:
            port: *port
          rtsp:
            port: 8554
          webrtc-tcp:
            port: 8555
            protocol: TCP
      appudp:
        controller: frigate
        ports:
          webrtc-udp:
            port: 8555
            protocol: UDP
    ingress:
      app:
        className: nginx-internal
        hosts:
          - host: &host "{{ .Release.Name }}.${CLUSTER_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: "${STORAGE_CLASS_DEFAULT}"
        globalMounts:
          - path: /data
      config-file:
        type: configMap
        name: frigate-configmap
        globalMounts:
          - path: /config/config.yml
            subPath: config.yml
            readOnly: true
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        globalMounts:
          - path: /dev/shm
      usb:
        type: hostPath
        hostPath: /dev/bus/usb
        hostPathType: Directory
        # HostToContainer (rslave) so Coral re-enumeration on the host —
        # new /dev/bus/usb/<bus>/<dev> node after a usbipd detach/attach or
        # firmware reload — propagates into the pod live. Without this the
        # kubelet mount is None-propagation and libedgetpu keeps scanning a
        # stale tree, failing to find 18d1:9302 → detector death → CrashLoop.
        globalMounts:
          - path: /dev/bus/usb
            mountPropagation: HostToContainer
      media:
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: "${STORAGE_CLASS_DEFAULT}"
        globalMounts:
          - path: /media
