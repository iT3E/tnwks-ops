---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  interval: 30m
  maxHistory: 2
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    env:
      - name: TZ
        value: "${TIMEZONE}"
      - name: DB_ENGINE
        value: "postgres"
      # cnpg generates the `postgres-app` Secret in the databases
      # namespace with all the connection bits; cross-namespace fetch
      # via the postgres-app Secret mirrored into this namespace by
      # external-secrets / reflector. For now we point at the cnpg
      # services + DB credentials directly.
      - name: POSTGRES_USER
        valueFrom:
          secretKeyRef:
            name: postgres-app
            key: username
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: postgres-app
            key: password
      - name: POSTGRES_SERVER
        # cnpg's read-write Service. Cross-namespace via FQDN.
        value: "postgres-rw.databases.svc.cluster.local"
      - name: POSTGRES_PORT
        value: "5432"
      - name: POSTGRES_DB
        valueFrom:
          secretKeyRef:
            name: postgres-app
            key: dbname

    image:
      repository: docker.io/hkotel/mealie
      tag: v0.5.6
    ingress:
      main:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
          hajimari.io/appName: Recipes
          hajimari.io/group: Home
          hajimari.io/icon: mdi:food
        hosts:
          - host: &host "recipes.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        ingressClassName: nginx
        tls:
          - hosts:
              - *host

    persistence:
      config:
        enabled: true
        mountPath: /app/data
        storageClass: ${STORAGE_CLASS_DEFAULT}
        size: 5Gi

    service:
      main:
        ports:
          http:
            port: 80

