---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  interval: 30m
  maxHistory: 2
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      mealie:
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.3.2
            env:
              - name: TZ
                value: "${TIMEZONE}"
              - name: ALLOW_SIGNUP
                value: "false"
              - name: BASE_URL
                value: "https://recipes.${SECRET_DOMAIN}"
              - name: DB_ENGINE
                value: "postgres"
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: postgres-app
                    key: username
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-app
                    key: password
              - name: POSTGRES_SERVER
                value: "postgres-rw.databases.svc.cluster.local"
              - name: POSTGRES_PORT
                value: "5432"
              - name: POSTGRES_DB
                value: "app"
    service:
      app:
        controller: mealie
        ports:
          http:
            port: 9000
    persistence:
      config:
        enabled: true
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ${STORAGE_CLASS_DEFAULT}
        globalMounts:
          - path: /app/data
    ingress:
      app:
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
          hajimari.io/appName: Recipes
          hajimari.io/group: Home
          hajimari.io/icon: mdi:food
        hosts:
          - host: &host "recipes.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
