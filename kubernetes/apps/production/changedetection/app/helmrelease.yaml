---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: changedetection
  namespace: production
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      type: statefulset
    image:
      repository: ghcr.io/dgtlmoon/changedetection.io
      tag: "0.55.5"
    env:
      TZ: ${TIMEZONE}
      PORT: &port 5000
      PUID: 568
      PGID: 568
      BASE_URL: https://changedetection.${SECRET_DOMAIN}
    service:
      main:
        ports:
          http:
            port: *port

    ingress:
      internal:
        enabled: true
        ingressClassName: "nginx-internal"
        hosts:
          - host: &internalHost "changedetection.${INTERNAL_DOMAIN}"
            paths:
              - path: /

    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    volumeClaimTemplates:
      - name: config
        mountPath: /datastore
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: "${STORAGE_CLASS_DEFAULT}"
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 500Mi
