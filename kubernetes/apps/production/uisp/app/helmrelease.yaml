---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uisp
  namespace: production
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      uisp:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: 5Gi
              storageClass: "${STORAGE_CLASS_DEFAULT}"
              globalMounts:
                - path: /config
        containers:
          app:
            image:
              repository: nico640/docker-unms
              tag: 3.0.159
            env:
              TZ: ${TIMEZONE}
              PUID: 911
              PGID: 911
              PUBLIC_HTTPS_PORT: 443
              PUBLIC_WS_PORT: 443
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 50
                  periodSeconds: 10
            resources:
              requests:
                cpu: 8000m
                memory: 4Gi
              limits:
                cpu: 8000m
                memory: 4Gi
    service:
      app:
        controller: uisp
        ports:
          http:
            port: 443
            protocol: HTTPS
    ingress:
      app:
        className: nginx
        annotations:
          external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_DOMAIN}"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        hosts:
          - host: &host "uisp.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
