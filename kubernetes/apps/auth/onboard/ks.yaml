---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: onboard
  namespace: flux-system
  labels:
    # Opt out of cluster-wide ${VAR} substitution on this Kustomization.
    # The ConfigMap ships JS template-literal expressions (e.g. ${c.cognitoDomain})
    # that envsubst would otherwise try to resolve and fail on. Hostnames in
    # this app are intentionally hardcoded (tnwks.us) so we don't depend on
    # cluster-settings to render the static content.
    substitution.flux.home.arpa/disabled: "true"
spec:
  dependsOn:
    - name: ingress-nginx
  path: ./kubernetes/apps/auth/onboard/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
