---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboard
  namespace: auth
  labels:
    app.kubernetes.io/name: onboard
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: onboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: onboard
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      # WSL Talos doesn't chown emptyDir on fsGroup, so the writable scratch
      # dirs nginx-unprivileged needs (/tmp, /var/cache/nginx, /var/run) come
      # up root-owned and read-only-root-fs nginx can't open its pid file.
      # Init container chowns them to uid 101 before the main container starts.
      initContainers:
        - name: chown-scratch
          image: nginxinc/nginx-unprivileged:1.27-alpine
          command:
            - /bin/sh
            - -c
            - chown -R 101:101 /tmp /var/cache/nginx /var/run
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
            - name: var-run
              mountPath: /var/run
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: static
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            # Writable scratch dirs nginx-unprivileged needs even when serving
            # static content read-only (temp paths, PID, cache).
            - name: tmp
              mountPath: /tmp
            - name: var-cache-nginx
              mountPath: /var/cache/nginx
            - name: var-run
              mountPath: /var/run
      volumes:
        - name: static
          configMap:
            name: onboard-static
        - name: nginx-conf
          configMap:
            name: onboard-nginx
        - name: tmp
          emptyDir: {}
        - name: var-cache-nginx
          emptyDir: {}
        - name: var-run
          emptyDir: {}
