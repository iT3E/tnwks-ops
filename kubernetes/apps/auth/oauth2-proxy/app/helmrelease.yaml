---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: auth
spec:
  interval: 30m
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.6.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    replicaCount: 1
    config:
      clientID: ${OAUTH2_PROXY_CLIENT_ID}
      clientSecret: ${OAUTH2_PROXY_CLIENT_SECRET}
      cookieSecret: ${OAUTH2_PROXY_COOKIE_SECRET}
      configFile: |-
        provider = "oidc"
        oidc_issuer_url = "${COGNITO_OIDC_ISSUER_URL}"
        # No static redirect_url. This single oauth2-proxy now fronts two entry
        # hosts — oauth2.internal.tnwks.us (internal apps like Grafana) and the
        # public oauth2.tnwks.us (the sites platform). With reverse_proxy=true
        # below, oauth2-proxy derives the callback per-request from the
        # X-Forwarded-* headers ingress-nginx sets, so each host gets its own
        # /oauth2/callback. Both callbacks are registered on the Cognito app
        # client (see infrastructure/terraform/.../cognito.tf).
        upstreams = ["static://200"]
        email_domains = ["*"]
        scope = "openid email profile"
        # Keep the cookie under nginx's default 4kB buffer. Cognito's id_token
        # alone is ~1.5kB; storing access + id + refresh blows past the limit
        # and forces oauth2-proxy to split the cookie, which the auth-subrequest
        # path can't reassemble before its buffer fills (502 at /oauth2/auth).
        # Grafana only consumes user-headers, so we skip the bearer bits.
        pass_access_token = false
        pass_authorization_header = false
        pass_user_headers = true
        set_xauthrequest = true
        set_authorization_header = false
        skip_jwt_bearer_tokens = false
        session_store_type = "cookie"
        reverse_proxy = true
        # Broadened from .${INTERNAL_DOMAIN} to .${SECRET_DOMAIN} (the apex,
        # tnwks.us). .${INTERNAL_DOMAIN} is a strict subset, so internal apps
        # (Grafana et al.) keep working unchanged — but the sites platform lives
        # at sites.${SECRET_DOMAIN}, which is a sibling of internal.* not a child,
        # so the old cookie domain would never reach it (auth loop). The apex
        # covers both subtrees with one session cookie.
        #   - whitelist_domains: lets oauth2-proxy honor rd= redirects back to
        #     any *.tnwks.us host (else it rejects them as open-redirects).
        #   - cookie_domains: sets the session cookie on .tnwks.us so it's sent
        #     to both internal.tnwks.us and sites.tnwks.us.
        whitelist_domains = [".${SECRET_DOMAIN}"]
        cookie_domains = [".${SECRET_DOMAIN}"]
        cookie_expire = "720h"
        cookie_refresh = "23h"
        cookie_secure = true
        cookie_samesite = "lax"
        skip_provider_button = true
    extraArgs:
      provider: oidc
    ingress:
      enabled: true
      className: nginx-internal
      annotations:
        # Cognito JWTs are large; oauth2-proxy splits the session cookie
        # into _oauth2_proxy_{0,1,...} chunks. The combined Set-Cookie
        # headers on /oauth2/callback overflow nginx's default 4k proxy
        # buffer and surface as 502 to the browser. Bump both.
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
      hosts:
        - oauth2.${INTERNAL_DOMAIN}
      tls:
        - hosts:
            - oauth2.${INTERNAL_DOMAIN}
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    metrics:
      enabled: false
