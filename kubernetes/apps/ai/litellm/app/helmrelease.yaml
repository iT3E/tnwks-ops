---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  interval: 30m
  maxHistory: 2
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.86.2-stable
            args:
              - --config
              - /etc/litellm/config.yaml
              - --port
              - "4000"
            env:
              # CNPG app password, sourced from the reflected `postgres-app`
              # secret (reflector mirrors it into the `ai` namespace). Used to
              # compose DATABASE_URL below via k8s env-var expansion, so the
              # password itself never lands in git.
              - name: DATABASE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-app
                    key: password
              - name: DATABASE_URL
                value: "postgresql://app:$(DATABASE_PASSWORD)@postgres-rw.databases.svc.cluster.local:5432/litellm"
              - name: LITELLM_MASTER_KEY
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: LITELLM_MASTER_KEY
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: 4000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: 4000
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: litellm
        ports:
          http:
            port: 4000
    persistence:
      config:
        type: configMap
        name: litellm-config
        advancedMounts:
          litellm:
            app:
              - subPath: config.yaml
                path: /etc/litellm/config.yaml
                readOnly: true
