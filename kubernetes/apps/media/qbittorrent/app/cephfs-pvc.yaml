---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cephfs-hdd-subvolume-qbit
  namespace: media
  labels:
    backup: "false"
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: "${STORAGE_CLASS_BULK}"
  resources:
    requests:
      storage: "${BULK_PVC_SIZE}"
  volumeMode: Filesystem
