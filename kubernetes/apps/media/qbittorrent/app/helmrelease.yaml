---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 65539
    controllers:
      qbittorrent:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 1Gi
              storageClass: ${STORAGE_CLASS_DEFAULT}
              globalMounts:
                - path: /config/qBittorrent/data
        initContainers:
          # fsGroupChangePolicy: OnRootMismatch isn't chowning intermediate
          # dirs kubelet creates to host nested mounts (/config/qBittorrent
          # comes through as root:root despite fsGroup=568), so the app
          # container — running as 568 — can't write its top-level profile.
          # Explicitly chown /config recursively before the app starts.
          00-chown-config:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: "1.38.0"
            command:
              - "/bin/sh"
              - -c
            args:
              - chown -R 568:568 /config
            securityContext:
              runAsUser: 0
              runAsGroup: 0
          copy-config:
            # No env-var substitution is needed in the bundled config files,
            # so a plain busybox `cp` is sufficient. The previous
            # ghcr.io/onedr0p/alpine image was GC'd from ghcr.
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: "1.38.0"
            command:
              - "/bin/sh"
              - -c
            args:
              - cp /data/configfiles/* /data/config/
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 5.0.4@sha256:17e3e5f1c7e7fe81434f9d1f5f2e00da9a67f6dbfda1c988c0619932cb856047
            env:
              UMASK: "022"
              QBITTORRENT__PORT: &port 8080
              QBITTORRENT__USE_PROFILE: "true"
            resources:
              requests:
                cpu: 49m
                memory: 1222Mi
              limits:
                memory: 1222Mi
          # gluetun sidecar holds the iVPN WireGuard tunnel. qbittorrent shares the
          # pod's network namespace; all its traffic is forced through the tunnel.
          # If gluetun's tunnel drops, qbittorrent loses network — fail-closed.
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            securityContext:
              # gluetun manages iptables + creates the wg0 interface; needs to
              # run as root with NET_ADMIN. The pod-level securityContext
              # forces uid 568, so explicitly override here.
              runAsUser: 0
              runAsGroup: 0
              capabilities:
                add: ["NET_ADMIN"]
            env:
              - name: VPN_SERVICE_PROVIDER
                value: ivpn
              - name: VPN_TYPE
                value: wireguard
              - name: WIREGUARD_PRIVATE_KEY
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-vpn-secret
                    key: WIREGUARD_PRIVATE_KEY
              - name: WIREGUARD_PUBLIC_KEY
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-vpn-secret
                    key: WIREGUARD_PUBLIC_KEY
              - name: WIREGUARD_PRESHARED_KEY
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-vpn-secret
                    key: WIREGUARD_PRESHARED_KEY
              - name: WIREGUARD_ADDRESSES
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-vpn-secret
                    key: WIREGUARD_ADDRESSES
              - name: WIREGUARD_ENDPOINT_IP
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-vpn-secret
                    key: WIREGUARD_ENDPOINT_IP
              - name: WIREGUARD_ENDPOINT_PORT
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-vpn-secret
                    key: WIREGUARD_ENDPOINT_PORT
              - name: SERVER_COUNTRIES
                value: "" # leave empty when WIREGUARD_ENDPOINT_IP is set
              - name: TZ
                value: "${TIMEZONE}"
              - name: FIREWALL_INPUT_PORTS
                # qbittorrent webUI port must be reachable from the cluster network
                # so the Service / Ingress can forward to it.
                value: "8080"
              - name: HEALTH_VPN_DURATION_INITIAL
                value: "30s"
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
    persistence:
      # qbittorrent writes its top-level profile under /config (e.g.
      # /config/qBittorrent/qBittorrent.conf, /config/.cache/...). The
      # nested mounts below cover /config/qBittorrent/{config,cache,data},
      # but the intermediate /config dir created by kubelet to host them
      # is owned root:root and unwritable by uid 568. A top-level
      # emptyDir mount at /config lets fsGroup=568 take effect there.
      home:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            00-chown-config:
              - path: /config
            app:
              - path: /config
      config:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            app:
              - path: /config/qBittorrent/config
      cache:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            app:
              - path: /config/qBittorrent/cache
      configfiles:
        type: configMap
        name: qbittorrent-configmap
        advancedMounts:
          qbittorrent:
            copy-config:
              - path: /data/configfiles
            app: []
      config-target:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            copy-config:
              - path: /data/config
      media:
        existingClaim: cephfs-hdd-subvolume-qbit
        globalMounts:
          - path: /data/media
    ingress:
      internal:
        # Internal-only — qbittorrent webUI must NEVER be exposed publicly.
        # The traffic itself egresses through the gluetun sidecar.
        className: nginx-internal
        hosts:
          - host: &internalHost "qbittorrent.${INTERNAL_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
