---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actions-runner-controller
  namespace: flux-system
spec:
  path: ./kubernetes/apps/tools/actions-runner-controller/controller/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # The runner scale set Kustomization installs an AutoscalingRunnerSet CRD
  # provided by this controller, so block until the controller is healthy.
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: gha-runner-scale-set-controller
      namespace: tools
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 30m
  retryInterval: 1m
  timeout: 5m
