---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sites-builder
  namespace: tools
spec:
  interval: 30m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.14.2
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # The controller HelmRelease must be installed first (it owns the
  # AutoscalingRunnerSet CRD this release creates).
  dependsOn:
    - name: gha-runner-scale-set-controller
  values:
    # Repo-scoped runners for the Angular source repo. Workflows target this
    # scale set with `runs-on: sites-builder` (the runnerScaleSetName below,
    # which defaults to the release name but is set explicitly for clarity).
    githubConfigUrl: "https://github.com/iT3E/tnwks-sites"
    runnerScaleSetName: sites-builder
    # Pre-defined secret (GitHub App) — see secret.sops.yaml.
    githubConfigSecret: sites-runner-github-app
    minRunners: 1
    maxRunners: 3
    # The chart auto-discovers the controller's ServiceAccount for RoleBinding;
    # set it explicitly since the controller HelmRelease is named
    # gha-runner-scale-set-controller (SA = <release>-gha-rs-controller).
    controllerServiceAccount:
      namespace: tools
      name: gha-runner-scale-set-controller-gha-rs-controller
    # Docker-in-Docker. The chart's `containerMode: dind` shortcut can't be
    # combined with a custom template, and we need a custom template for the
    # NFS mount — so the full dind pod spec is written out here (per the
    # chart's documented dind template) with the /sites NFS volume added to
    # the runner container.
    template:
      spec:
        initContainers:
          # Seed the runner's externals into a shared volume so the dind
          # sidecar and runner agree on hook tooling.
          - name: init-dind-externals
            image: ghcr.io/actions/actions-runner:latest
            command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
          # Native sidecar (restartPolicy: Always) running the Docker daemon.
          - name: dind
            image: docker:dind
            args:
              - dockerd
              - --host=unix:///var/run/docker.sock
              - --group=$(DOCKER_GROUP_GID)
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            restartPolicy: Always
            startupProbe:
              exec:
                command: ["docker", "info"]
              initialDelaySeconds: 0
              failureThreshold: 24
              periodSeconds: 5
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              - name: dind-externals
                mountPath: /home/runner/externals
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                value: "120"
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              # Shared NFS export served by nfs-server (storage namespace);
              # build jobs publish their dist/ output straight onto the volume
              # nginx serves.
              - name: sites
                mountPath: /sites
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
        volumes:
          - name: work
            emptyDir: {}
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
          - name: sites
            nfs:
              server: nfs-server.storage.svc.cluster.local
              path: /export
