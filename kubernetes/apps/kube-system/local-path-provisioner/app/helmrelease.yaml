---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: ./deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: local-path-provisioner
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    helperImage:
      repository: public.ecr.aws/docker/library/busybox
      tag: latest
    # Two StorageClasses on this cluster:
    #   local-path       â€” default, on the Talos node container's overlay (C:)
    #   local-path-bulk  â€” pinned to homelab-wsl-worker-2 with a bind-mount of
    #                      Windows E: at /mnt/e for bulk video / archive PVCs.
    # The chart treats `storageClassConfigs` as exclusive with the top-level
    # `storageClass` block â€” only entries in the map are created.
    storageClassConfigs:
      local-path:
        storageClass:
          create: true
          defaultClass: true
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
            paths: ["/var/lib/rancher/k3s/storage"]
      local-path-bulk:
        storageClass:
          create: true
          defaultClass: false
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-2
            paths: ["/mnt/e/k8s-storage"]
    # NOTE: Do not enable Flux variable substitution on this HelmRelease
    configmap:
      setup: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        mkdir -m 0777 -p ${absolutePath}
        chmod 701 ${absolutePath}/..
      teardown: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        rm -rf ${absolutePath}
