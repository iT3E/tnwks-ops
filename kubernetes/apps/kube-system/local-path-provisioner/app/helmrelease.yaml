---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: ./deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: local-path-provisioner
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    helperImage:
      repository: public.ecr.aws/docker/library/busybox
      tag: latest
    # Three StorageClasses on this cluster (post WSL drive migration â€”
    # all paths now on the single ext4 vhdx, no more /mnt/e DrvFs split):
    #   local-path       â€” DEFAULT. /var/lib/rancher/k3s/storage on both
    #                      workers. General-purpose.
    #   local-path-bulk  â€” /var/lib/rancher/k3s/storage/bulk on both workers.
    #                      Bulk video/archive (frigate-media etc.).
    #   local-path-ext4  â€” LEGACY. /var/lib/rancher/k3s/storage on worker-1.
    #                      Kept for existing PVCs (postgres). Functionally
    #                      equivalent to local-path now; can be consolidated
    #                      later.
    # The chart treats `storageClassConfigs` as exclusive with the top-level
    # `storageClass` block â€” only entries in the map are created.
    storageClassConfigs:
      local-path:
        storageClass:
          create: true
          defaultClass: true
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-1
            paths: ["/var/lib/rancher/k3s/storage"]
          - node: homelab-wsl-worker-2
            paths: ["/var/lib/rancher/k3s/storage"]
      local-path-bulk:
        storageClass:
          create: true
          defaultClass: false
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-1
            paths: ["/var/lib/rancher/k3s/storage/bulk"]
          - node: homelab-wsl-worker-2
            paths: ["/var/lib/rancher/k3s/storage/bulk"]
      local-path-ext4:
        storageClass:
          create: true
          defaultClass: false
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-1
            paths: ["/var/lib/rancher/k3s/storage"]
    # NOTE: Do not enable Flux variable substitution on this HelmRelease
    configmap:
      setup: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        mkdir -m 0777 -p ${absolutePath}
        chmod 701 ${absolutePath}/..
      teardown: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        rm -rf ${absolutePath}
