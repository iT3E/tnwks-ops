---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: ./deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: local-path-provisioner
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    helperImage:
      repository: public.ecr.aws/docker/library/busybox
      tag: latest
    # Three StorageClasses on this cluster:
    #   local-path       ŌĆö DEFAULT. /mnt/e/k8s-storage/default on worker-2.
    #                      Use for almost everything; PVCs avoid the WSL
    #                      ext4.vhdx on C:.
    #   local-path-bulk  ŌĆö /mnt/e/k8s-storage on worker-2. Bulk video/archive
    #                      (frigate-media etc.). Same bind-mount as default.
    #   local-path-ext4  ŌĆö /var/lib/rancher/k3s/storage on worker-1. The WSL
    #                      ext4.vhdx (C:). Used only by workloads that can't
    #                      live on the Windows DrvFs bind-mount because they
    #                      need real Linux permissions semantics (chmod /
    #                      setuid). Postgres is the canonical case: initdb
    #                      fails on /mnt/e with "could not change permissions
    #                      of postgresql.conf: Operation not permitted".
    # The chart treats `storageClassConfigs` as exclusive with the top-level
    # `storageClass` block ŌĆö only entries in the map are created.
    storageClassConfigs:
      local-path:
        storageClass:
          create: true
          defaultClass: true
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-2
            paths: ["/mnt/e/k8s-storage/default"]
      local-path-bulk:
        storageClass:
          create: true
          defaultClass: false
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-2
            paths: ["/mnt/e/k8s-storage"]
      local-path-ext4:
        storageClass:
          create: true
          defaultClass: false
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-1
            paths: ["/var/lib/rancher/k3s/storage"]
    # NOTE: Do not enable Flux variable substitution on this HelmRelease
    configmap:
      setup: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        mkdir -m 0777 -p ${absolutePath}
        chmod 701 ${absolutePath}/..
      teardown: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        rm -rf ${absolutePath}
