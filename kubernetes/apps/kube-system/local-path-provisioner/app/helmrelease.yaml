---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: ./deploy/chart/local-path-provisioner
      sourceRef:
        kind: GitRepository
        name: local-path-provisioner
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    helperImage:
      repository: public.ecr.aws/docker/library/busybox
      tag: latest
    # Two StorageClasses on this cluster — both pinned to homelab-wsl-worker-2,
    # which is the only node with the Windows E: bind-mount at /mnt/e/k8s-storage:
    #   local-path       — default, /mnt/e/k8s-storage/default
    #   local-path-bulk  — /mnt/e/k8s-storage (bulk video / archive PVCs;
    #                      frigate-media's PV is here and stays put)
    # local-path is a subdir under the same bind-mount the worker-2 container
    # has into Windows E:, so all PVCs avoid the WSL ext4.vhdx on C:.
    # The chart treats `storageClassConfigs` as exclusive with the top-level
    # `storageClass` block — only entries in the map are created.
    storageClassConfigs:
      local-path:
        storageClass:
          create: true
          defaultClass: true
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-2
            paths: ["/mnt/e/k8s-storage/default"]
      local-path-bulk:
        storageClass:
          create: true
          defaultClass: false
          defaultVolumeType: hostPath
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
        nodePathMap:
          - node: homelab-wsl-worker-2
            paths: ["/mnt/e/k8s-storage"]
    # NOTE: Do not enable Flux variable substitution on this HelmRelease
    configmap:
      setup: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        mkdir -m 0777 -p ${absolutePath}
        chmod 701 ${absolutePath}/..
      teardown: |-
        #!/bin/sh
        while getopts "m:s:p:" opt
        do
            case $opt in
                p)
                absolutePath=$OPTARG
                ;;
                s)
                sizeInBytes=$OPTARG
                ;;
                m)
                volMode=$OPTARG
                ;;
            esac
        done
        rm -rf ${absolutePath}
