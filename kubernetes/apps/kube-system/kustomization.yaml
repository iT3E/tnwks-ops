---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# CNI (cilium for ms-01, flannel for wsl) is added per-cluster via the
# cluster overlay under kubernetes/clusters/<cluster>/apps/.
resources:
  - ./namespace.yaml
  - ./metrics-server/ks.yaml
  - ./reflector/ks.yaml
  - ./reloader/ks.yaml
# local-path-provisioner is WSL-only (MS-01 uses Rook Ceph). Added back
# via kubernetes/clusters/wsl/apps/kustomization.yaml.
