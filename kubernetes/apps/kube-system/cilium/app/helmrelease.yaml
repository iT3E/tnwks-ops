---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: ${CILIUM_VERSION}
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    bpf:
      masquerade: true
    cluster:
      name: ${CLUSTER_NAME}
      id: 1
    hubble:
      enabled: true
      metrics:
        enabled:
          - dns:query;ignoreAAAA
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
        serviceMonitor:
          enabled: ${CILIUM_SERVICEMONITOR_ENABLED}
      relay:
        enabled: true
        rollOutPods: true
        prometheus:
          serviceMonitor:
            enabled: ${CILIUM_SERVICEMONITOR_ENABLED}
      ui:
        enabled: true
        rollOutPods: true
        ingress:
          enabled: ${CILIUM_HUBBLE_UI_INGRESS_ENABLED}
          className: nginx
          hosts:
            - &host "hubble.${INTERNAL_DOMAIN}"
          tls:
            - hosts:
                - *host
    ipam:
      mode: kubernetes
    # Both clusters use Talos kube-prism (localhost:7445) for pod->apiserver,
    # so no per-cluster KUBE_VIP_ADDR substitution is needed here.
    k8sServiceHost: localhost
    k8sServicePort: 7445
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    operator:
      replicas: 1
      rollOutPods: true
      prometheus:
        enabled: ${CILIUM_SERVICEMONITOR_ENABLED}
        serviceMonitor:
          enabled: ${CILIUM_SERVICEMONITOR_ENABLED}
    prometheus:
      enabled: ${CILIUM_SERVICEMONITOR_ENABLED}
      serviceMonitor:
        enabled: ${CILIUM_SERVICEMONITOR_ENABLED}
    rollOutCiliumPods: true
    autoDirectNodeRoutes: true
    ipv4NativeRoutingCIDR: ${CLUSTER_CIDR}
    routingMode: native
