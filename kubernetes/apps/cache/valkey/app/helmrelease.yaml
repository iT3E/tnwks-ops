---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: cache
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        runAsNonRoot: true
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      valkey:
        # Single-node session store for oauth2-proxy. RDB persistence enabled
        # (snapshot every 60s if ≥ 1 key changed) so sessions survive pod/node
        # restarts. Cognito is still the source of truth — worst case (corrupt RDB)
        # forces a one-time re-auth, same as the old cookie-store behaviour.
        # See kubernetes/apps/auth/oauth2-proxy for the consumer.
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: 9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
            # Keep the image entrypoint (docker-entrypoint.sh) and drive config
            # via args. ${VALKEY_PASSWORD} is substituted by Flux from
            # cluster-secrets (same mechanism oauth2-proxy uses for its
            # client secret).
            #   --save 60 1 : RDB snapshot every 60s if ≥ 1 write.
            #   --appendonly no : AOF disabled (RDB is sufficient for sessions).
            #   --maxmemory-policy noeviction: never silently drop a live
            #     session under memory pressure; oauth2-proxy sets a TTL on
            #     every key so they expire on their own.
            args:
              - valkey-server
              - --requirepass
              - ${VALKEY_PASSWORD}
              - --save
              - "60"
              - "1"
              - --appendonly
              - "no"
              - --maxmemory
              - 128mb
              - --maxmemory-policy
              - noeviction
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 192Mi
    service:
      app:
        controller: valkey
        ports:
          valkey:
            port: 6379
    persistence:
      # RDB snapshots (--save 60 1) land in /data/dump.rdb. With a PVC,
      # sessions survive pod/node restarts — no forced re-login on reboot.
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 128Mi
        storageClass: ${STORAGE_CLASS_DEFAULT}
        globalMounts:
          - path: /data
