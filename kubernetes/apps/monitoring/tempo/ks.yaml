---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tempo
  namespace: flux-system
spec:
  interval: 10m
  path: "./kubernetes/apps/monitoring/tempo/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true # alloy + grafana datasource read from tempo
  dependsOn:
    - name: kube-prometheus-stack
