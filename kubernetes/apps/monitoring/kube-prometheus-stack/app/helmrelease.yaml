---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  maxHistory: 2
  timeout: 20m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.3.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 30m
  values:
    crds:
      enabled: true
      # Helm itself never upgrades CRDs. Chart 60+ ships an opt-in
      # CRD upgrade Job that runs as a helm hook so prometheus-operator
      # CRDs actually move when the chart version moves; without it
      # the operator pod crashloops on schema mismatches after big
      # jumps (e.g. 54 → 85).
      upgradeJob:
        enabled: true
        forceConflicts: true

    ###
    ### Component values
    ###
    alertmanager:
      enabled: false

    kubeApiServer:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          # Remove duplicate metrics
          - sourceLabels: ["__name__"]
            regex: "(aggregator_openapi|aggregator_unavailable|apiextensions_openapi|apiserver_admission|apiserver_audit|apiserver_cache|apiserver_cel|apiserver_client|apiserver_crd|apiserver_current|apiserver_envelope|apiserver_flowcontrol|apiserver_init|apiserver_kube|apiserver_longrunning|apiserver_request|apiserver_requested|apiserver_response|apiserver_selfrequest|apiserver_storage|apiserver_terminated|apiserver_tls|apiserver_watch|apiserver_webhooks|authenticated_user|authentication|disabled_metric|etcd_bookmark|etcd_lease|etcd_request|field_validation|get_token|go|grpc_client|hidden_metric|kube_apiserver|kubernetes_build|kubernetes_feature|node_authorizer|pod_security|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|serviceaccount_legacy|serviceaccount_stale|serviceaccount_valid|watch_cache|workqueue)_(.+)"
            action: keep
          - sourceLabels: ["__name__"]
            regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
            action: drop
          - sourceLabels: ["__name__"]
            regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)
            action: drop

    kubeControllerManager:
      enabled: false

    kubeEtcd:
      enabled: false

    kubelet:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          # Remove duplicate metrics
          - sourceLabels: ["__name__"]
            regex: "(apiserver_audit|apiserver_client|apiserver_delegated|apiserver_envelope|apiserver_storage|apiserver_webhooks|authentication_token|cadvisor_version|container_blkio|container_cpu|container_fs|container_last|container_memory|container_network|container_oom|container_processes|container|csi_operations|disabled_metric|get_token|go|hidden_metric|kubelet_certificate|kubelet_cgroup|kubelet_container|kubelet_containers|kubelet_cpu|kubelet_device|kubelet_graceful|kubelet_http|kubelet_lifecycle|kubelet_managed|kubelet_node|kubelet_pleg|kubelet_pod|kubelet_run|kubelet_running|kubelet_runtime|kubelet_server|kubelet_started|kubelet_volume|kubernetes_build|kubernetes_feature|machine_cpu|machine_memory|machine_nvm|machine_scrape|node_namespace|plugin_manager|prober_probe|process_cpu|process_max|process_open|process_resident|process_start|process_virtual|registered_metric|rest_client|scrape_duration|scrape_samples|scrape_series|storage_operation|volume_manager|volume_operation|workqueue)_(.+)"
            action: keep
          - sourceLabels: ["node"]
            targetLabel: instance
            action: replace

    kubeProxy:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeStateMetrics:
      enabled: true
    kube-state-metrics:
      metricLabelsAllowlist:
        - "persistentvolumeclaims=[*]"
      prometheus:
        monitor:
          enabled: true
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels: ["__meta_kubernetes_pod_node_name"]
              targetLabel: kubernetes_node
      resources:
        requests:
          cpu: 15m
          memory: 127M
        limits:
          memory: 153M

    nodeExporter:
      enabled: false

    grafana:
      enabled: false
      forceDeployDashboards: true
      sidecar:
        dashboards:
          multicluster:
            etcd:
              enabled: true

    ###
    ### Prometheus operator values
    ###
    prometheusOperator:
      resources:
        requests:
          cpu: 35m
          memory: 273M
        limits:
          memory: 326M

      prometheusConfigReloader:
        # resource config for prometheusConfigReloader
        resources:
          requests:
            cpu: 5m
            memory: 64M
          limits:
            memory: 64M

    ###
    ### Prometheus instance values
    ###
    prometheus:
      ingress:
        enabled: true
        ingressClassName: nginx-internal
        pathType: Prefix
        hosts:
          - &host_prometheus prometheus.${INTERNAL_DOMAIN}
        tls:
          - hosts:
              - *host_prometheus

      prometheusSpec:
        additionalAlertManagerConfigs:
          - static_configs:
              - targets:
                  - alertmanager.monitoring.svc.cluster.local:9093
            api_version: v2
        additionalScrapeConfigs:

          - job_name: windows-exporter
            scrape_interval: 30s
            scrape_timeout: 10s
            static_configs:
              - targets:
                  - ${WINDOWS_HOST_IP}:9182
                labels:
                  instance: DESKTOP-HKE05KI

          - job_name: vyos
            scrape_interval: 30s
            scrape_timeout: 10s
            static_configs:
              - targets:
                  - 10.10.91.1:9100
                labels:
                  instance: sce-vyos01

          - job_name: edgerouter
            scrape_interval: 60s
            scrape_timeout: 15s
            metrics_path: /snmp
            params:
              module: [if_mib]
              target: [172.16.1.1]
            static_configs:
              - targets:
                  - snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116
                labels:
                  instance: edgerouter-lite
            relabel_configs:
              - source_labels: []
                target_label: __address__
                replacement: snmp-exporter-prometheus-snmp-exporter.monitoring.svc.cluster.local:9116

          - job_name: unms_exporter
            # for a static target "unms.example.org", rewrite it to
            # "exporter.example.org:9806/metrics?target=unms.example.org",
            # but keep "unms.example.org" as instance label
            relabel_configs:
              - source_labels: [__address__]
                target_label: instance
              - source_labels: [__address__]
                target_label: __param_target
              - replacement: 'unms-exporter.monitoring.svc.cluster.local:9806'
                target_label: __address__
            static_configs:
              - targets:
                - uisp.tnwks.us


        enableAdminAPI: true
        externalLabels:
          cluster: homelab-wsl
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        replicas: 1
        replicaExternalLabelName: "__replica__" # must match with thanos value `.query.replicaLabel[0]`
        resources:
          requests:
            cpu: 257m
            memory: 3760M
          limits:
            memory: 3760M
        retention: 2d
        retentionSize: "6GB"
        ruleSelectorNilUsesHelmValues: false
        scrapeInterval: 1m
        serviceMonitorSelectorNilUsesHelmValues: false
        # storageSpec: empty {} = emptyDir. On WSL kubelet doesn't honor
        # fsGroupChangePolicy on local-path PVCs (the prometheus container
        # uid:gid 1000:2000 hits `permission denied:
        # /prometheus/queries.active` and crashloops). EmptyDir works.
        # 2-day retention loses data on pod restart but for a dev cluster
        # that's fine. MS-01 overlay should kustomize-patch this back to
        # a real PVC against ceph-block when MS-01 is bootstrapped.
        storageSpec: {}
        # thanos sidecar is intentionally absent here. The thanos chart
        # itself is gated MS-01-only (see apps/monitoring/kustomization
        # — loki/thanos/vector are added in clusters/ms-01/apps), so the
        # WSL base must not ship a sidecar that tries to mount a
        # non-existent thanos-objstore-secret. The MS-01 overlay should
        # patch the prometheus block to add `thanos:` and the matching
        # thanosService/thanosServiceMonitor when MS-01 comes online.
        walCompression: true

  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: ConfigMap
              labelSelector: grafana_dashboard in (1)
            patch: |-
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: not-used
                namespace: not-used
                annotations:
                  grafana_folder: Kubernetes
