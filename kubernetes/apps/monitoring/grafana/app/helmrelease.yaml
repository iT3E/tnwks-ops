---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: 10.5.15
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  dependsOn:
    - name: local-path-provisioner
      namespace: kube-system
    - name: ingress-nginx
      namespace: networking
  values:
    deploymentStrategy:
      type: Recreate
    # init-chown-data runs busybox chown as root over the PVC. On WSL
    # local-path PVCs that EPERMs against existing files owned by the
    # grafana uid (472), and the pod CrashLoops. Modern grafana sets
    # its own ownership via fsGroup; we don't need the init container.
    initChownData:
      enabled: false
    admin:
      existingSecret: grafana-admin-secret
    env:
      GF_EXPLORE_ENABLED: true
      GF_SERVER_ROOT_URL: "https://grafana.${INTERNAL_DOMAIN}"

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            disableDeletion: false
            editable: true
            folder: ""
            options:
              path: /var/lib/grafana/dashboards/default
            orgId: 1
            type: file
          - name: node-exporter
            disableDeletion: false
            editable: true
            folder: "node-exporter"
            options:
              path: /var/lib/grafana/dashboards/node-exporter
            orgId: 1
            type: file
          - name: unpoller
            disableDeletion: false
            editable: true
            folder: "UniFi Poller"
            options:
              path: /var/lib/grafana/dashboards/unpoller
            orgId: 1
            type: file
          - name: ceph
            disableDeletion: false
            editable: true
            folder: "ceph"
            options:
              path: /var/lib/grafana/dashboards/ceph
            orgId: 1
            type: file
          - name: windows
            disableDeletion: false
            editable: true
            folder: "Windows"
            options:
              path: /var/lib/grafana/dashboards/windows
            orgId: 1
            type: file
          - name: nginx
            disableDeletion: false
            editable: true
            folder: "NGINX"
            options:
              path: /var/lib/grafana/dashboards/nginx
            orgId: 1
            type: file
          - name: plausible
            disableDeletion: false
            editable: true
            folder: "Plausible"
            options:
              path: /var/lib/grafana/dashboards/plausible
            orgId: 1
            type: file

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - access: proxy
            isDefault: true
            name: Prometheus
            type: prometheus
            url: http://kube-prometheus-stack-prometheus.monitoring:9090
          - access: proxy
            name: Loki
            type: loki
            uid: loki
            url: http://loki-gateway.monitoring.svc.cluster.local:80
          - access: proxy
            name: Tempo
            type: tempo
            uid: tempo
            url: http://tempo.monitoring.svc.cluster.local:3200
            jsonData:
              # Trace -> Logs correlation: jump from a Tempo span to the Faro
              # logs Alloy wrote to Loki for the same trace.
              tracesToLogsV2:
                datasourceUid: loki
                filterByTraceID: true
          - name: Alertmanager
            type: alertmanager
            access: proxy
            url: http://alertmanager.monitoring.svc.cluster.local:9093
            jsonData:
              implementation: prometheus
        deleteDatasources:
          - name: Loki
            orgId: 1
          - name: Alertmanager
            orgId: 1

    dashboards:
      default:
        speedtest-exporter-hub:
          gnetId: 13665
          revision: 4
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus

      node-exporter:
        # Ref: https://grafana.com/grafana/dashboards/1860-node-exporter-full/
        node-exporter:
          gnetId: 1860
          revision: 29
          datasource: Prometheus

      unpoller:
        # Ref: https://grafana.com/grafana/dashboards/11315
        clients:
          gnetId: 11315
          revision: 9
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus
        # Ref: https://grafana.com/grafana/dashboards/11312
        usw:
          gnetId: 11312
          revision: 9
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus
        # Ref: https://grafana.com/grafana/dashboards/11314
        uap:
          gnetId: 11314
          revision: 10
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus
      ceph:
      # Ref: https://grafana.com/grafana/dashboards/2842-ceph-cluster/
        cluster:
          gnetId: 2842
          revision: 17
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus
      # Ref: https://grafana.com/grafana/dashboards/5336-ceph-osd-single/
        osd:
          gnetId: 5336
          revision: 9
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus
      # Ref: https://grafana.com/grafana/dashboards/5342-ceph-pools/
        pools:
          gnetId: 5342
          revision: 9
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus


      windows:
      # Ref: https://grafana.com/grafana/dashboards/14694-windows-exporter-dashboard/
        windows-exporter:
          gnetId: 14694
          revision: 2
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus

      nginx:
      # Ref: https://grafana.com/grafana/dashboards/14314-kubernetes-nginx-ingress-controller-nextgen-devops-nirvana/
        nginx-ingress:
          gnetId: 14314
          revision: 2
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus

      plausible:
        # Ref: https://grafana.com/grafana/dashboards/22200-plausible-analytics/
        plausible-analytics:
          gnetId: 22200
          revision: 1
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus

    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        reporting_enabled: false
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/home.json
      date_formats:
        use_browser_locale: true
      explore:
        enabled: true
      grafana_net:
        url: https://grafana.net
      log:
        mode: console
      news:
        news_feed_enabled: false
      panels:
        disable_sanitize_html: true
      paths:
        data: /var/lib/grafana/data
        logs: /var/log/grafana
        plugins: /var/lib/grafana/plugins
        provisioning: /etc/grafana/provisioning
      security:
        allow_embedding: true
        cookie_samesite: grafana
      server:
        root_url: https://grafana.${INTERNAL_DOMAIN}
      auth.proxy:
        enabled: true
        # X-Auth-Request-User from oauth2-proxy is the Cognito `sub` (a GUID).
        # Use the email header as the Grafana login instead so accounts have a
        # human-readable handle.
        header_name: X-Auth-Request-Email
        header_property: email
        headers: "Email:X-Auth-Request-Email Groups:X-Auth-Request-Groups"
        auto_sign_up: true
        enable_login_token: true
      auth:
        # Keep local admin login as fallback while oauth2-proxy is being rolled out.
        disable_login_form: false
        # With auth.proxy enabled, Grafana never owns the session — oauth2-proxy
        # re-injects X-Auth-Request-Email on the next request, so the in-app
        # sign-out button silently re-creates the user. Send logout to Cognito's
        # /logout endpoint, which ends the SSO session and then redirects to the
        # client's registered logout_url (oauth2-proxy /oauth2/sign_out), which
        # in turn clears the proxy cookie. End-to-end logout in one hop.
        signout_redirect_url: https://auth.tnwks.us/logout?client_id=${OAUTH2_PROXY_CLIENT_ID}&logout_uri=https%3A%2F%2Foauth2.${INTERNAL_DOMAIN}%2Foauth2%2Fsign_out
      users:
        auto_assign_org: true
        auto_assign_org_role: Admin

    imageRenderer:
      enabled: true

    plugins:
      - natel-discrete-panel
      - pr0ps-trackmap-panel
      - grafana-piechart-panel
      - vonage-status-panel
      - grafana-worldmap-panel
      - grafana-clock-panel

    podAnnotations:
      configmap.reloader.stakater.com/reload: grafana
      secret.reloader.stakater.com/reload: grafana-secrets

    rbac:
      pspEnabled: false

    resources:
      limits:
        memory: 219M
      requests:
        cpu: 23m
        memory: 127M

    serviceMonitor:
      enabled: true

    sidecar:
      dashboards:
        enabled: true
        labelValue: ""
        label: grafana_dashboard
        folderAnnotation: grafana_folder
        searchNamespace: ALL
        provider:
          disableDelete: true
          foldersFromFilesStructure: true
      datasources:
        enabled: true
        labelValue: ""
        searchNamespace: ALL
      logLevel: INFO

    ingress:
      enabled: true
      ingressClassName: nginx-internal
      annotations:
        hajimari.io/icon: simple-icons:grafana
        nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.auth.svc.cluster.local:80/oauth2/auth"
        nginx.ingress.kubernetes.io/auth-signin: "https://oauth2.${INTERNAL_DOMAIN}/oauth2/start?rd=$scheme://$host$escaped_request_uri"
        nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Groups,X-Auth-Request-Email"
        # Cognito-backed sessions are split across multiple cookies; the
        # subrequest header chunk overflows nginx's default 4k buffer.
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
        nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
      hosts:
        - &host "grafana.${INTERNAL_DOMAIN}"
      tls:
        - hosts:
            - *host
    persistence:
      enabled: true
      storageClassName: "${STORAGE_CLASS_DEFAULT}"

