---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
resources:
  - ./backup-onetime.yaml
  - ./cluster.yaml
  - ./prometheusrule.yaml
  - ./service.yaml
  - ./scheduled-backup.yaml
# s3-cnpg-bucket.yaml uses ObjectBucketClaim which only exists when Rook
# is installed. Added back per-cluster via kubernetes/clusters/ms-01/apps/.
labels:
  - pairs:
      app.kubernetes.io/name: cloudnative-pg-cluster
      app.kubernetes.io/instance: cloudnative-pg-cluster
      app.kubernetes.io/part-of: cloudnative-pg
