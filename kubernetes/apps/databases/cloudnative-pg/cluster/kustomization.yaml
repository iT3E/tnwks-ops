---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: databases
resources:
  - ./cluster.yaml
  - ./service.yaml
# PrometheusRule lives in cluster-prometheusrules/ behind its own
# Kustomization that depends on kube-prometheus-stack so the CRD
# exists before apply.
# Backup machinery (ScheduledBackup, BackupOnetime, ObjectBucketClaim)
# lives in cluster-backup/ and is wired in only on MS-01 where Rook S3
# is available.
labels:
  - pairs:
      app.kubernetes.io/name: cloudnative-pg-cluster
      app.kubernetes.io/instance: cloudnative-pg-cluster
      app.kubernetes.io/part-of: cloudnative-pg
