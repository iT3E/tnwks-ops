---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: databases
  annotations:
    kyverno.io/ignore: "true"
spec:
  instances: ${CNPG_INSTANCES}
  primaryUpdateStrategy: unsupervised
  storage:
    size: ${CNPG_INSTANCE_SIZE}
    # Postgres needs Linux permission semantics (initdb chmods
    # postgresql.conf). On WSL, ${STORAGE_CLASS_DEFAULT} (=local-path on
    # /mnt/e Windows DrvFs bind-mount) breaks initdb with EPERM, so we
    # use a separate SC variable that points at an ext4 path on the WSL
    # cluster and still maps to the cluster default elsewhere.
    storageClass: ${STORAGE_CLASS_DATABASE}
  superuserSecret:
    name: postgres-superuser
  monitoring:
    enablePodMonitor: ${SERVICE_MONITOR_ENABLED}
  # Annotations on the generated `postgres-app` Secret tell stakater/reflector
  # to mirror it into namespaces that need the credentials (e.g. mealie in
  # production/, litellm in ai/, plausible in selfhosted/). The reflected Secret
  # keeps the same name + keys.
  inheritedMetadata:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "production,ai,selfhosted"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "production,ai,selfhosted"
  bootstrap:
    initdb:
      database: app
      owner: app
      # Extra databases owned by `app`. cnpg's `postInitApplicationSQL`
      # runs once on first cluster boot, creating any per-app databases
      # we want to keep schema-isolated.
      postInitApplicationSQL:
        - CREATE DATABASE bitwarden OWNER app;
        - CREATE DATABASE litellm OWNER app;
