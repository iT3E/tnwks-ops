---
# MS-01-only: defines the actual postgres Cluster resource, scheduled
# backups, and PrometheusRule. Depends on cloudnative-pg-app (the
# operator) and on Rook Ceph for the S3 backup target. Wire in via
# kubernetes/clusters/ms-01/apps/kustomization.yaml.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-cluster
  namespace: flux-system
spec:
  dependsOn:
    - name: cloudnative-pg-app
  path: ./kubernetes/apps/databases/cloudnative-pg/cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 3m
