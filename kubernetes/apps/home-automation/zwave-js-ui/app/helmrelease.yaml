---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zwave-js-ui
  namespace: home-automation
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: "sce-uk8sw03"
    controllers:
      zwave-js-ui:
        type: statefulset
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: 1Gi
              storageClass: "${STORAGE_CLASS_DEFAULT}"
              globalMounts:
                - path: /usr/src/app/store
        containers:
          app:
            image:
              repository: ghcr.io/zwave-js/zwave-js-ui
              tag: 11.18.0
            env:
              TZ: ${TIMEZONE}
            securityContext:
              privileged: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8091
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 500Mi
    service:
      app:
        controller: zwave-js-ui
        ports:
          http:
            port: *port
          websocket:
            port: 3000
    persistence:
      usb:
        type: hostPath
        hostPath: /dev/serial/by-id/usb-0658_0200-if00 #had to configure this serial port in settings manually via browser
        hostPathType: CharDevice
        # HostToContainer (rslave) for parity with the frigate Coral mount.
        # This is a single CharDevice leaf, so propagation is effectively a
        # no-op today — but it documents intent and is correct should the
        # mount ever move to the parent /dev/serial directory.
        globalMounts:
          - path: /dev/serial/by-id/usb-0658_0200-if00
            mountPropagation: HostToContainer
    ingress:
      app:
        className: nginx-internal
        hosts:
          - host: &host "zwave.${INTERNAL_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
