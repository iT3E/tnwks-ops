---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: storage
  labels:
    app.kubernetes.io/name: nfs-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nfs-server
  ports:
    - name: nfs
      port: 2049
      targetPort: nfs
      protocol: TCP
    - name: mountd
      port: 20048
      targetPort: mountd
      protocol: TCP
    - name: rpcbind
      port: 111
      targetPort: rpcbind
      protocol: TCP
