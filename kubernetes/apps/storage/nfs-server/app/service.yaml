---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: storage
  labels:
    app.kubernetes.io/name: nfs-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nfs-server
  # NFSv4-only: clients reach the server on 2049 alone. Ganesha starts rpcbind
  # internally but NFSv4.1 clients never need it, so mountd/rpcbind aren't
  # exposed.
  ports:
    - name: nfs
      port: 2049
      targetPort: nfs
      protocol: TCP
    - name: nfs-udp
      port: 2049
      targetPort: nfs-udp
      protocol: UDP
