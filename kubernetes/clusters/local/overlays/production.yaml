# Excludes frigate (needs Coral USB) and uisp (heavy, not relevant for local sim)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps/production/namespace.yaml
  - ../../../apps/production/mealie/ks.yaml
  - ../../../apps/production/jellyfin/ks.yaml
  - ../../../apps/production/matrix/ks.yaml
  - ../../../apps/production/vaultwarden/ks.yaml
  - ../../../apps/production/ombi/ks.yaml
  - ../../../apps/production/ombi-f/ks.yaml
  - ../../../apps/production/wizarr/ks.yaml
  - ../../../apps/production/bookstack/ks.yaml
  - ../../../apps/production/changedetection/ks.yaml
  # frigate excluded — needs Coral USB
  # uisp excluded — heavy resource footprint, prod-only
