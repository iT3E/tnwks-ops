---
# MS-01 cluster apps: shared apps + Cilium CNI + Rook Ceph (MS-01-only,
# real disks needed) + Ceph-RGW-backed ObjectBucketClaims. WSL gets
# Flannel via its own overlay and skips the Ceph-dependent bits.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps
  - ../../../apps/kube-system/cilium/ks.yaml
  - ../../../apps/storage/rook-ceph/rook-ceph-operator
  - ../../../apps/storage/rook-ceph/cluster
  # MS-01-only: loki, thanos, vector, and the cnpg postgres cluster all
  # depend on Rook S3 buckets (or chain to something that does). They
  # live behind their own Kustomizations.
  - ../../../apps/monitoring/loki/ks.yaml
  - ../../../apps/monitoring/thanos/ks.yaml
  - ../../../apps/monitoring/vector/ks.yaml
  - ../../../apps/databases/cloudnative-pg/ks-cluster.yaml
  # node-feature-discovery is MS-01-only too — needed for hardware-aware
  # pod scheduling (Coral TPU, Aeotec Z-Stick). Its worker DaemonSet
  # probes hang on Talos-in-Docker WSL2 sysfs.
  - ../../../apps/tools/node-feature-discovery/ks.yaml
  # mealie hardcodes postgres connection — needs cnpg-cluster (MS-01-only).
  - ../../../apps/production/mealie/ks.yaml
  # ObjectBucketClaims rely on the objectbucket.io CRD installed by Rook,
  # so they're added per-cluster here rather than in the shared app paths.
  - ../../../apps/databases/cloudnative-pg/cluster/s3-cnpg-bucket.yaml
  - ../../../apps/monitoring/thanos/app/s3-thanos-bucket.yaml
  - ../../../apps/monitoring/loki/app/s3-loki-bucket.yaml
