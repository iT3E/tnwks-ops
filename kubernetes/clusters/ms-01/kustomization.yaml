---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Core infrastructure
  - ../../apps/cert-manager
  - ../../apps/databases
  - ../../apps/default
  - ../../apps/flux-system
  - ../../apps/kube-system

  # Storage (prod-only: in-cluster Rook Ceph)
  - ../../apps/storage/rook-ceph/rook-ceph-operator
  - ../../apps/storage/rook-ceph/cluster

  # Networking (full stack including cloudflared)
  - ../../apps/networking

  # Apps (full stack)
  - ../../apps/home-automation
  - ../../apps/media
  - ../../apps/monitoring
  - ../../apps/production
  - ../../apps/selfhosted
  - ../../apps/tools
  - ../../apps/vpn

  # Cluster settings overlay
  - ./cluster-settings.yaml
