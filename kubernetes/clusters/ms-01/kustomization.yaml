---
# Flux entry point for the MS-01 cluster.
#
# Loaded by `flux bootstrap github --path=kubernetes/clusters/ms-01`.
# Contains:
#   - flux-system/    Flux components + GitRepository (managed by `flux bootstrap`)
#   - cluster-settings.yaml + cluster-secrets.sops.yaml  Per-cluster vars
#   - meta.yaml       Flux Kustomization → ../../flux/meta (HelmRepositories etc.)
#   - apps.yaml       Flux Kustomization → ./apps (which fans out to ../../apps)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./flux-system
  - ./cluster-settings.yaml
  - ./cluster-secrets.sops.yaml
  - ./meta.yaml
  - ./apps.yaml
