---
# WSL cluster overlay: production namespace
#
# frigate is included — the Coral TPU is plugged into the desktop and
# passed through Windows -> WSL -> Docker -> Talos. See
# docs/usb-passthrough.md for the chain.
#
# uisp is omitted from the WSL cluster — it's a heavy single-instance
# device-management workload that lives on the MS-01 cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../apps/production/namespace.yaml
  - ../../../../apps/production/jellyfin/ks.yaml
  - ../../../../apps/production/mealie/ks.yaml
  - ../../../../apps/production/vaultwarden/ks.yaml
  - ../../../../apps/production/ombi/ks.yaml
  - ../../../../apps/production/ombi-f/ks.yaml
  - ../../../../apps/production/wizarr/ks.yaml
  - ../../../../apps/production/changedetection/ks.yaml
  # sites: nginx serving AI-built Angular frontends at sites.tnwks.us/<project>/
  # off the shared NFS export (nfs-server lives in the storage namespace, wired
  # in the WSL apps overlay one level up).
  - ../../../../apps/production/sites/ks.yaml
  # packing-api: write-backend for the editable packing list on the Van Trip
  # site. Gated by the same oauth2-proxy that protects /<project>/private/*,
  # persists to the cnpg `vantrip` database. WSL-only, same as sites.
  - ../../../../apps/production/packing-api/ks.yaml
  # raines-things-api: write-backend for the Raine's Things storefront. One
  # service, two ingresses — a public one (catalog/checkout/webhook/tracking)
  # and an oauth2-gated one for /admin/*. Persists to the cnpg `raines`
  # database; Stripe + SMTP creds via its own SOPS secret. WSL-only, same as sites.
  - ../../../../apps/production/raines-things-api/ks.yaml
  # frigate: WSL-specific Flux Kustomization with a patch to replace the
  # NFD coral nodeSelector with a hostname pin to homelab-wsl-worker-2.
  - ./frigate-ks.yaml
