# WSL cluster overlay: networking namespace
# Excludes cloudflared — the production Cloudflare tunnel terminates on the
# MS-01 cluster. The WSL cluster is reachable on the LAN only.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../apps/networking/namespace.yaml
  - ../../../../apps/networking/external-dns/ks.yaml
  - ../../../../apps/networking/ingress-nginx/ks.yaml
  - ../../../../apps/networking/ingress-nginx-internal/ks.yaml
  - ../../../../apps/networking/k8s-gateway/ks.yaml
