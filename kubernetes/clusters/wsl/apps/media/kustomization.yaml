---
# WSL cluster overlay: media namespace
#
# qbittorrent and prowlarr depend on pod-gateway-downloads (in the vpn
# namespace) for VPN-routed egress. The vpn namespace is excluded on WSL
# because Flannel can't enforce the CiliumNetworkPolicy that gates
# pod-gateway egress.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../apps/media/namespace.yaml
  - ../../../../apps/media/radarr/ks.yaml
  - ../../../../apps/media/recyclarr/ks.yaml
  - ../../../../apps/media/sonarr/ks.yaml
