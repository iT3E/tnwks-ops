---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1beta2.json
# Actions Runner Controller "scale set" charts (gha-runner-scale-set-controller
# + gha-runner-scale-set) are published only as OCI artifacts under this path.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: actions-runner-controller
  namespace: flux-system
spec:
  type: oci
  interval: 2h
  url: oci://ghcr.io/actions/actions-runner-controller-charts
