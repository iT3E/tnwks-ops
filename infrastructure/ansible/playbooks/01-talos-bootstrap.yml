---
# Phase 1 of bootstrap: stand up the Talos cluster
# (followed by 02-cni, 03-sops, 04-flux)
#
# For wsl:   runs `talosctl cluster create` against Docker
# For ms-01: applies machineconfigs to MS-01 nodes via talosctl
#
# Idempotent — checks if the cluster already exists before recreating.
#
# Run via:
#   ansible-playbook -i inventory/wsl.yml   playbooks/01-talos-bootstrap.yml
#   ansible-playbook -i inventory/ms-01.yml playbooks/01-talos-bootstrap.yml

- name: Bootstrap Talos cluster
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  vars:
    cluster_target: "{{ talos_target | default('wsl') }}"
    cluster_name: "homelab-{{ cluster_target }}"
    talos_dir: "{{ playbook_dir }}/../../../talos/{{ cluster_target }}"
    kubeconfig_path: "{{ ansible_env.HOME }}/.kube/config-{{ cluster_name }}"

  tasks:
    - name: Ensure talosctl is installed
      ansible.builtin.command: talosctl version --client
      register: talosctl_check
      changed_when: false
      failed_when: talosctl_check.rc != 0

    - name: Ensure ~/.kube directory exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: "0755"

    # ─── WSL (Docker mode) ──────────────────────────────────────────────
    - name: Check for existing WSL Talos containers
      ansible.builtin.command: >-
        docker ps -aq --filter name=^{{ cluster_name }}-controlplane
      register: cluster_containers
      changed_when: false
      when: cluster_target == 'wsl'

    # Resource sizing notes (host has 64GiB RAM):
    #   * 4 CPU / 4 GiB on the CP — etcd + apiserver + flux-system pods that
    #     don't tolerate the worker taint comfortably fit here.
    #   * 4 CPU / 8 GiB per worker — Prometheus, matrix-synapse, jellyfin
    #     each want 0.5-1.5 GiB resident; 2 GiB was the original choke point.
    #   * Total Talos footprint ~20 GiB, plus Docker daemon + WSL services,
    #     so the host's `.wslconfig` should grant the WSL VM at least 24 GiB.
    - name: Create WSL Talos Docker cluster
      ansible.builtin.command: >-
        talosctl cluster create docker
        --name {{ cluster_name }}
        --workers 2
        --cpus-controlplanes 4.0
        --cpus-workers 4.0
        --memory-controlplanes 4GiB
        --memory-workers 8GiB
        --kubernetes-version 1.34.0
        --config-patch @{{ talos_dir }}/cluster-config.yaml
      when:
        - cluster_target == 'wsl'
        - cluster_containers.stdout | trim | length == 0
      register: cluster_create

    - name: Fetch WSL kubeconfig
      ansible.builtin.command: >-
        talosctl kubeconfig {{ kubeconfig_path }}
        --nodes 10.5.0.2
        --force
      when: cluster_target == 'wsl'
      changed_when: true

    # ─── WSL: augment worker-2 with USB + bulk storage ──────────────────
    # `talosctl cluster create docker` doesn't accept --device flags or
    # extra bind-mounts, so the worker-2 container needs a one-time
    # rebuild to attach:
    #   - /dev/bus/usb (Coral TPU; busid changes when firmware reloads)
    #   - /dev/serial/by-id/usb-0658_0200-if00 (Aeotec Z-Stick)
    #   - /mnt/e/k8s-storage (bulk PVC backing for local-path-bulk SC)
    # Named volumes from the original talosctl-built container are
    # preserved verbatim so PVC data, kubelet state, and the machine
    # config carry over.
    #
    # Idempotent: re-runs are no-ops if the container already exposes
    # all three. Skipped entirely on hosts where the bulk-storage path
    # or USB devices aren't present (e.g. CI / fresh clones).
    - name: Configure worker-2 augmentations (USB + bulk storage)
      when: cluster_target == 'wsl'
      vars:
        worker_name: "{{ cluster_name }}-worker-2"
        bulk_host_path: /mnt/e/k8s-storage
        zstick_path: /dev/serial/by-id/usb-0658_0200-if00
      block:
        - name: Check whether bulk-storage host path exists
          ansible.builtin.stat:
            path: "{{ bulk_host_path }}"
          register: bulk_path_stat

        - name: Ensure bulk-storage host path exists
          ansible.builtin.file:
            path: "{{ bulk_host_path }}"
            state: directory
            mode: "0777"
          when: not bulk_path_stat.stat.exists

        - name: Check whether Coral USB tree is present on host
          ansible.builtin.stat:
            path: /dev/bus/usb
          register: usb_bus_stat

        - name: Check whether Z-Stick is present on host
          ansible.builtin.stat:
            path: "{{ zstick_path }}"
          register: zstick_stat

        - name: Check whether host /dev tree is present
          ansible.builtin.stat:
            path: /dev
          register: host_dev_stat

        - name: Skip augmentation when neither USB nor bulk path is available
          ansible.builtin.debug:
            msg: |
              Neither USB devices nor bulk-storage path detected on host.
              worker-2 left at stock talosctl config. Re-run after
              `usbipd attach` or after E: is mounted.
          when:
            - not usb_bus_stat.stat.exists
            - not zstick_stat.stat.exists
            - not bulk_path_stat.stat.exists

        - name: Inspect current worker-2 container
          community.docker.docker_container_info:
            name: "{{ worker_name }}"
          register: w2_info

        # Both USB devices reach worker-2 as rslave bind mounts (not --device)
        # so host re-enumeration — usbipd detach/attach, Coral firmware reload,
        # or a Z-Stick attached *after* the container started — propagates the
        # live device node into the container. A --device flag snapshots the
        # major/minor at container start and goes stale on re-enum (or is never
        # created at all if the device wasn't attached yet): libedgetpu then
        # finds no 18d1:9302 and Frigate CrashLoops, and zwave-js-ui's kubelet
        # mount fails with "/dev/ttyACM0 is not a character device".
        # privileged: true already grants the device-cgroup access bind mounts
        # need.
        #
        #   - Coral: bind /dev/bus/usb (libedgetpu speaks raw usbfs nodes, and
        #     the subtree is self-contained, so it mounts directly).
        #   - Z-Stick: bind the whole host /dev at a *dedicated* /hostdev
        #     mountpoint, NOT over the container's own /dev. zwave-js-ui opens
        #     a CDC tty (/dev/ttyACM0), whose only parent dir is /dev itself;
        #     overlaying the container's /dev would shadow Talos's /dev/pts,
        #     /dev/shm and submounts and break the node. The zwave-js-ui WSL
        #     overlay points the pod hostPath at /hostdev/ttyACM0 to match.
        # See docs/usb-passthrough.md.
        - name: Build desired device list
          ansible.builtin.set_fact:
            w2_devices: []

        - name: Build desired bind-mount list
          ansible.builtin.set_fact:
            w2_bind_mounts: >-
              {{
                ([ '/dev/bus/usb:/dev/bus/usb:rslave' ] if usb_bus_stat.stat.exists else [])
                + ([ '/dev:/hostdev:rslave' ] if host_dev_stat.stat.exists else [])
                + ([ bulk_host_path ~ ':' ~ bulk_host_path ] if bulk_path_stat.stat.exists else [])
              }}

        # Both USB passthroughs are now rslave binds, so look in Binds (not
        # Devices). A container still carrying the old --device form (or
        # lacking the /hostdev bind) has no matching entry here, so the flag
        # stays false and triggers the migrating recreate.
        - name: Detect whether worker-2 already has the desired augmentations
          ansible.builtin.set_fact:
            w2_has_usb: >-
              {{ usb_bus_stat.stat.exists | bool
                 and (w2_info.container.HostConfig.Binds | default([]))
                       | select('match', '^/dev/bus/usb:')
                       | list | length > 0 }}
            w2_has_hostdev: >-
              {{ host_dev_stat.stat.exists | bool
                 and (w2_info.container.HostConfig.Binds | default([]))
                       | select('match', '^/dev:/hostdev:')
                       | list | length > 0 }}
            w2_has_bulk: >-
              {{ bulk_path_stat.stat.exists | bool
                 and (w2_info.container.HostConfig.Binds | default([]))
                       | select('match', '^' ~ bulk_host_path ~ ':')
                       | list | length > 0 }}

        - name: Recreate worker-2 with USB devices + bulk-storage bind-mount
          when:
            - w2_info.exists
            - (usb_bus_stat.stat.exists and not w2_has_usb)
              or (host_dev_stat.stat.exists and not w2_has_hostdev)
              or (bulk_path_stat.stat.exists and not w2_has_bulk)
          block:
            - name: Capture original named volumes from worker-2
              ansible.builtin.set_fact:
                w2_volume_args: >-
                  {{ w2_info.container.Mounts
                     | selectattr('Type', 'equalto', 'volume')
                     | map(attribute='Name')
                     | zip(w2_info.container.Mounts
                           | selectattr('Type', 'equalto', 'volume')
                           | map(attribute='Destination'))
                     | map('join', ':')
                     | list }}

            - name: Capture original env vars from worker-2 (preserves USERDATA / PLATFORM / TALOSSKU)
              ansible.builtin.set_fact:
                w2_env: >-
                  {{ dict(w2_info.container.Config.Env
                          | map('split', '=', 1)
                          | map('list')) }}

            - name: Drain worker-2 before recreate
              ansible.builtin.command: >-
                kubectl drain {{ worker_name }}
                --ignore-daemonsets --delete-emptydir-data
                --force --timeout=120s
              changed_when: true
              failed_when: false

            - name: Stop and remove existing worker-2 container
              community.docker.docker_container:
                name: "{{ worker_name }}"
                state: absent

            - name: Recreate worker-2 container with augmentations
              community.docker.docker_container:
                name: "{{ worker_name }}"
                hostname: "{{ worker_name }}"
                image: "{{ w2_info.container.Config.Image }}"
                state: started
                restart_policy: "no"
                privileged: true
                read_only: true
                shm_size: 64M
                memory: 8G
                cpus: 4
                security_opts:
                  - seccomp=unconfined
                  - label=disable
                sysctls:
                  net.ipv6.conf.all.disable_ipv6: "0"
                networks:
                  - name: "{{ cluster_name }}"
                    ipv4_address: "{{ w2_info.container.NetworkSettings.Networks[cluster_name].IPAMConfig.IPv4Address }}"
                purge_networks: true
                labels:
                  org.opencontainers.image.source: https://github.com/siderolabs/talos
                  talos.cluster.name: "{{ cluster_name }}"
                  talos.owned: "true"
                  talos.type: worker
                tmpfs:
                  - /run
                  - /system
                  - /tmp
                volumes: "{{ w2_volume_args + w2_bind_mounts }}"
                devices: "{{ w2_devices }}"
                env:
                  PLATFORM: "{{ w2_env.PLATFORM }}"
                  TALOSSKU: "{{ w2_env.TALOSSKU }}"
                  PATH: "{{ w2_env.PATH }}"
                  USERDATA: "{{ w2_env.USERDATA }}"

            - name: Wait for worker-2 to be Ready
              ansible.builtin.command: >-
                kubectl wait --for=condition=Ready
                node/{{ worker_name }} --timeout=180s
              changed_when: false

            - name: Uncordon worker-2
              ansible.builtin.command: kubectl uncordon {{ worker_name }}
              changed_when: true

    # ─── MS-01 (Bare metal) ─────────────────────────────────────────────
    - name: Verify MS-01 node IPs are configured
      ansible.builtin.fail:
        msg: |
          MS-01 inventory has placeholder IPs. Update
          infrastructure/ansible/inventory/ms-01.yml with real MS-01 IPs
          before running this playbook.
      when:
        - cluster_target == 'ms-01'
        - groups['talos_controlplane'] is not defined or groups['talos_controlplane'] | length == 0

    - name: Apply controlplane config to each MS-01 node
      ansible.builtin.command: >-
        talosctl apply-config
        --insecure
        --nodes {{ item }}
        --file {{ talos_dir }}/controlplane.yaml
      loop: "{{ groups['talos_controlplane'] | default([]) }}"
      when: cluster_target == 'ms-01'
      changed_when: true

    - name: Bootstrap etcd on first controlplane
      ansible.builtin.command: >-
        talosctl bootstrap --nodes {{ groups['talos_controlplane'][0] }}
      when:
        - cluster_target == 'ms-01'
        - groups['talos_controlplane'] | default([]) | length > 0
      changed_when: true
      register: bootstrap_result
      failed_when:
        - bootstrap_result.rc != 0
        - "'AlreadyExists' not in bootstrap_result.stderr"

    - name: Fetch MS-01 kubeconfig
      ansible.builtin.command: >-
        talosctl kubeconfig {{ kubeconfig_path }}
        --nodes {{ groups['talos_controlplane'][0] }}
        --force
      when:
        - cluster_target == 'ms-01'
        - groups['talos_controlplane'] | default([]) | length > 0
      changed_when: true

    - name: Show kubeconfig location
      ansible.builtin.debug:
        msg: "Kubeconfig written to {{ kubeconfig_path }}"
