---
# actions/labeler v5+ requires array of config options per label
# (https://github.com/actions/labeler#match-object). Each entry is a
# match object; `changed-files: any-glob-to-any-file: [...]` is the
# v4-equivalent "any matching file" behavior.
area/ansible:
  - changed-files:
      - any-glob-to-any-file: "ansible/**/*"
area/github:
  - changed-files:
      - any-glob-to-any-file: ".github/**/*"
area/kubernetes:
  - changed-files:
      - any-glob-to-any-file: "kubernetes/**/*"
area/terraform:
  - changed-files:
      - any-glob-to-any-file: "terraform/**/*"
area/templates:
  - changed-files:
      - any-glob-to-any-file: "tmpl/**/*"
