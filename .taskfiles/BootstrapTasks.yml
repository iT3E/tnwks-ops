---
version: "3"

vars:
  ANSIBLE_PLAYBOOK_DIR: "{{.ANSIBLE_DIR}}/playbooks"
  ANSIBLE_INVENTORY_DIR: "{{.ANSIBLE_DIR}}/inventory"

env:
  ANSIBLE_CONFIG: "{{.ANSIBLE_DIR}}/ansible.cfg"

tasks:
  wsl:
    desc: Bootstrap the WSL Talos cluster (Talos → CNI → SOPS → Flux)
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/wsl.yml {{.ANSIBLE_PLAYBOOK_DIR}}/01-talos-bootstrap.yml
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/wsl.yml {{.ANSIBLE_PLAYBOOK_DIR}}/02-cni-bootstrap.yml
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/wsl.yml {{.ANSIBLE_PLAYBOOK_DIR}}/03-sops-keys.yml
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/wsl.yml {{.ANSIBLE_PLAYBOOK_DIR}}/04-flux-install.yml

  ms-01:
    desc: Bootstrap the MS-01 Talos cluster (Talos → CNI → SOPS → Flux)
    dir: "{{.ANSIBLE_DIR}}"
    cmds:
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/ms-01.yml {{.ANSIBLE_PLAYBOOK_DIR}}/01-talos-bootstrap.yml
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/ms-01.yml {{.ANSIBLE_PLAYBOOK_DIR}}/02-cni-bootstrap.yml
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/ms-01.yml {{.ANSIBLE_PLAYBOOK_DIR}}/03-sops-keys.yml
      - ansible-playbook -i {{.ANSIBLE_INVENTORY_DIR}}/ms-01.yml {{.ANSIBLE_PLAYBOOK_DIR}}/04-flux-install.yml
