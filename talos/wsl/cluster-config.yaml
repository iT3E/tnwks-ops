# talosctl cluster create configuration for the WSL Docker-mode cluster
#
# Usage:
#   talosctl cluster create docker \
#     --name homelab-wsl \
#     --workers 2 \
#     --cpus-controlplanes 2.0 --cpus-workers 2.0 \
#     --memory-controlplanes 2GiB --memory-workers 2GiB \
#     --kubernetes-version 1.34.0 \
#     --config-patch @talos/wsl/cluster-config.yaml
#
# This creates a 3-node cluster (1 CP + 2 workers) in Docker containers.
# CNI is disabled so Cilium can be installed via Flux post-bootstrap.

cluster:
  network:
    cni:
      name: none
    podSubnets:
      - 10.42.0.0/16
    serviceSubnets:
      - 10.43.0.0/16
  proxy:
    disabled: true
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: false
      service:
        disabled: true

machine:
  features:
    kubePrism:
      enabled: true
      port: 7445
